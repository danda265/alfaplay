<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ditado Mágico — AlfaPlay</title>
<link rel="stylesheet" href="css/game.css"/>
<style>
  body { display:flex; flex-direction:column; min-height:100vh; }
  .main { flex:1; padding:1.5rem 1rem; display:flex; flex-direction:column; align-items:center; gap:1.5rem; max-width:500px; margin:0 auto; width:100%; }
  .input-wrap { display:flex; flex-direction:column; align-items:center; gap:0.8rem; width:100%; }
  #resposta { width:100%; }
  .feedback-area { min-height:60px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:0.4rem; }
  .palavra-correta { font-family:var(--pixel); font-size:1.2rem; color:var(--green); text-shadow:2px 2px 0 #000; }
  #btn-falar { font-size:2.5rem; padding:0.4em 0.7em; }
  .nivel-label { font-family:var(--pixel); font-size:0.55rem; color:#64748b; }
  #resultado-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100;
    display:none; align-items:center; justify-content:center; flex-direction:column; gap:1.5rem;
    text-align:center; padding:1rem;
  }
  #resultado-overlay.show { display:flex; }
  .big-title { font-family:var(--pixel); font-size:clamp(0.9rem,3.5vw,1.5rem); line-height:1.8; }
</style>
</head>
<body>
<header class="game-header">
  <a href="index.html" class="btn btn-gray" style="font-size:0.8rem;">← VOLTAR</a>
  <span class="pixel-title" style="color:#facc15;">🎧 DITADO MÁGICO</span>
  <div class="score-badge" id="score-badge">⭐ 0</div>
</header>

<div class="main">
  <div class="year-pills">
    <button class="year-pill" data-ano="1" onclick="iniciar(1)">🟢 1º</button>
    <button class="year-pill" data-ano="2" onclick="iniciar(2)">🔵 2º</button>
    <button class="year-pill" data-ano="3" onclick="iniciar(3)">🩷 3º</button>
  </div>

  <div class="progress-wrap" style="width:100%;max-width:400px;">
    <div class="progress-bar" id="progresso" style="width:0%"></div>
  </div>
  <span class="nivel-label" id="rodada-label">PALAVRA 1 DE 10</span>

  <!-- Botão falar -->
  <button class="btn btn-yellow" id="btn-falar" onclick="falarAtual()">🔊</button>
  <p style="font-size:0.8rem;color:#64748b;">Ouça e escreva a palavra</p>

  <!-- Campo -->
  <div class="input-wrap">
    <input class="ditado-input" id="resposta" type="text" placeholder="ESCREVA AQUI" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn btn-green" style="width:100%;max-width:300px;font-size:1.1rem;" onclick="verificar()">✅ CONFIRMAR</button>
  </div>

  <!-- Feedback -->
  <div class="feedback-area" id="feedback"></div>

  <button class="btn btn-gray" onclick="pular()">⏭️ PULAR</button>
</div>

<div id="toast-container"></div>
<div id="confetti-overlay"></div>

<div id="resultado-overlay">
  <div class="big-title" id="res-titulo">🏆 FIM!</div>
  <div class="score-badge" style="font-size:1rem;" id="res-score">⭐ 0</div>
  <div id="res-acertos" style="font-size:0.85rem;color:#94a3b8;"></div>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-green" onclick="iniciar(anoAtual)">🔄 JOGAR DE NOVO</button>
    <a href="index.html" class="btn btn-gray">🏠 INÍCIO</a>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/sounds.js"></script>
<script>
let anoAtual = parseInt(new URLSearchParams(location.search).get('ano')) || 1;
let fila=[], atual=null, pontos=0, rodada=0, total=10, acertos=0, aguardando=false;

document.querySelectorAll('.year-pill').forEach(p => {
  if (parseInt(p.dataset.ano) === anoAtual) p.classList.add('active');
});

function iniciar(ano) {
  anoAtual = ano;
  document.querySelectorAll('.year-pill').forEach(p =>
    p.classList.toggle('active', parseInt(p.dataset.ano) === ano));
  pontos=0; rodada=0; acertos=0; aguardando=false;
  document.getElementById('score-badge').textContent = '⭐ 0';
  document.getElementById('resultado-overlay').classList.remove('show');
  document.getElementById('feedback').innerHTML = '';
  const pool = [...DATA[ano].palavras].sort(() => Math.random()-.5);
  fila = pool.slice(0, total);
  proximaPalavra();
}

function proximaPalavra() {
  if (rodada >= fila.length) { fimJogo(); return; }
  atual = fila[rodada++];
  aguardando = false;
  document.getElementById('resposta').value = '';
  document.getElementById('resposta').disabled = false;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('rodada-label').textContent = `PALAVRA ${rodada} DE ${total}`;
  document.getElementById('progresso').style.width = ((rodada-1)/total*100)+'%';
  document.getElementById('resposta').focus();
  setTimeout(falarAtual, 400);
}

function falarAtual() {
  if (!atual) return;
  falar(atual.palavra);
  // Anima botão
  const b = document.getElementById('btn-falar');
  b.style.transform = 'scale(1.2)';
  setTimeout(() => b.style.transform = '', 300);
}

function verificar() {
  if (!atual || aguardando) return;
  const input = document.getElementById('resposta');
  const resp = input.value.trim().toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const correta = atual.palavra.toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  if (!resp) { falarAtual(); return; }
  aguardando = true;
  input.disabled = true;

  if (resp === correta) {
    pontos += 10; acertos++;
    document.getElementById('score-badge').textContent = '⭐ ' + pontos;
    SFX.acerto();
    document.getElementById('feedback').innerHTML =
      `<div class="palavra-correta">${atual.emoji} ${atual.palavra} ✅</div>`;
    toast('🎉 CORRETO!', 'acerto');
    falar('Correto! ' + atual.palavra);
    setTimeout(proximaPalavra, 1500);
  } else {
    SFX.erro();
    document.getElementById('feedback').innerHTML =
      `<div style="color:var(--red);font-family:var(--pixel);font-size:0.7rem;">❌ ${resp}</div>
       <div class="palavra-correta">${atual.emoji} A PALAVRA É: ${atual.palavra}</div>`;
    toast('❌ INCORRETO', 'erro');
    falar('A palavra correta é ' + atual.palavra);
    setTimeout(proximaPalavra, 2200);
  }
}

function pular() {
  if (aguardando) return;
  pontos = Math.max(0, pontos-3);
  document.getElementById('score-badge').textContent = '⭐ ' + pontos;
  toast('⏭️ PULANDO... ERA: ' + atual.palavra, 'info');
  proximaPalavra();
}

function fimJogo() {
  SFX.vitoria();
  if (acertos >= total * 0.7) confetti();
  document.getElementById('res-titulo').textContent =
    acertos >= total * 0.8 ? '🏆 EXCELENTE!' : acertos >= total * 0.5 ? '👍 BOM TRABALHO!' : '📚 CONTINUE PRATICANDO!';
  document.getElementById('res-score').textContent = '⭐ ' + pontos + ' PONTOS';
  document.getElementById('res-acertos').textContent = acertos + ' de ' + total + ' corretas';
  document.getElementById('resultado-overlay').classList.add('show');
  falar('Você acertou ' + acertos + ' palavras!');
}

function toast(msg, tipo) {
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'toast ' + tipo; d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => d.remove(), 2200);
}

function confetti() {
  const ov = document.getElementById('confetti-overlay');
  const cores = ['#4ade80','#60a5fa','#f472b6','#facc15','#fb923c','#c084fc'];
  for (let i=0;i<60;i++) {
    const p=document.createElement('div'); p.className='confetti-p';
    p.style.left=Math.random()*100+'vw';
    p.style.background=cores[Math.floor(Math.random()*cores.length)];
    p.style.animationDuration=(1.5+Math.random()*2)+'s';
    p.style.animationDelay=Math.random()*0.8+'s';
    ov.appendChild(p); setTimeout(()=>p.remove(),3500);
  }
}

document.getElementById('resposta').addEventListener('keydown', e => {
  if (e.key === 'Enter') verificar();
});

iniciar(anoAtual);
</script>
</body>
</html>
