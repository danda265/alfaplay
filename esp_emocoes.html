<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Emoções — AlfaPlay Especial</title>
<link rel="stylesheet" href="css/game.css"/>
<style>
  body{display:flex;flex-direction:column;min-height:100vh;background:#0a1628;}
  .main{flex:1;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:560px;margin:0 auto;width:100%;}
  .instrucao{background:var(--dark2);border:2px solid #fb923c;border-radius:14px;padding:.8rem 1.2rem;text-align:center;width:100%;}
  .instrucao .txt{font-size:1.05rem;color:#e2e8f0;font-weight:700;}
  .instrucao .sub{font-size:.78rem;color:#64748b;margin-top:.2rem;}

  /* Modo: reconhecer emoção */
  .rosto-display{font-size:clamp(5rem,20vw,9rem);text-align:center;line-height:1;
    filter:drop-shadow(0 0 20px rgba(251,146,60,.3));}
  .pergunta{font-family:var(--pixel);font-size:clamp(.6rem,2.5vw,.9rem);color:#e2e8f0;
    text-align:center;line-height:1.8;}

  /* Opções de emoções */
  .emocoes-grid{display:grid;gap:.7rem;justify-content:center;width:100%;}
  .emocao-btn{background:var(--dark2);border:3px solid var(--border);border-radius:16px;
    padding:.8rem .6rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.4rem;
    transition:transform .12s,border-color .15s;box-shadow:0 3px 0 rgba(0,0,0,.4);}
  .emocao-btn:hover{transform:scale(1.05);border-color:#fb923c;}
  .emocao-btn .em-ico{font-size:2.8rem;line-height:1;}
  .emocao-btn .em-txt{font-family:var(--pixel);font-size:.42rem;color:#94a3b8;text-align:center;}
  .emocao-btn.correta{border-color:#4ade80;background:rgba(74,222,128,.15);animation:bounce .4s ease;}
  .emocao-btn.errada{border-color:#f87171;background:rgba(248,113,113,.12);animation:shake .3s ease;}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  /* Modo aprendizado — card grande com explicação */
  .aprender-card{background:var(--dark2);border:3px solid #fb923c;border-radius:20px;
    padding:1.5rem;text-align:center;width:100%;max-width:380px;}
  .aprend-emoji{font-size:5rem;margin-bottom:.5rem;}
  .aprend-nome{font-family:var(--pixel);font-size:.8rem;color:#facc15;margin-bottom:.5rem;}
  .aprend-desc{font-size:.85rem;color:#94a3b8;line-height:1.6;}
  .aprend-situacao{background:var(--dark3);border-radius:10px;padding:.6rem;
    font-size:.8rem;color:#e2e8f0;margin-top:.6rem;font-style:italic;}

  /* Reforço */
  #reforco{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
  #reforco.show{display:flex;}
  .rf-ico{font-size:5rem;animation:pop .4s ease;}
  .rf-txt{font-family:var(--pixel);font-size:clamp(.8rem,3.5vw,1.2rem);color:#facc15;
    text-shadow:3px 3px 0 #000;text-align:center;line-height:1.8;}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}

  .modo-btns{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
  .modo-btn{font-family:var(--pixel);font-size:.42rem;padding:.4em .9em;border-radius:99px;
    border:2px solid var(--border);background:var(--dark3);color:var(--text);cursor:pointer;transition:all .15s;}
  .modo-btn.ativo{border-color:#fb923c;background:rgba(251,146,60,.15);color:#fb923c;}
</style>
</head>
<body>
<header class="game-header">
  <a href="especial.html" class="btn btn-gray" style="font-size:.8rem;">← VOLTAR</a>
  <span class="pixel-title" style="color:#fb923c;">😊 EMOÇÕES</span>
  <div class="score-badge" id="score-badge">⭐ 0</div>
</header>

<div class="main">
  <div class="instrucao" id="instrucao">
    <div class="txt">Como essa pessoa está se sentindo?</div>
    <div class="sub">Toque na emoção certa</div>
  </div>

  <div class="modo-btns">
    <button class="modo-btn ativo" onclick="setModo('quiz',this)">🎮 QUIZ</button>
    <button class="modo-btn"       onclick="setModo('aprender',this)">📖 APRENDER</button>
  </div>

  <div id="area-quiz">
    <div style="display:flex;flex-direction:column;align-items:center;gap:.8rem;width:100%;">
      <div class="rosto-display" id="rosto-display">😊</div>
      <p class="pergunta" id="pergunta">Como essa pessoa está se sentindo?</p>
      <div class="emocoes-grid" id="emocoes-grid"></div>
    </div>
  </div>

  <div id="area-aprender" style="display:none;width:100%;display:none;flex-direction:column;align-items:center;gap:.8rem;">
    <div class="aprender-card" id="aprender-card"></div>
    <div style="display:flex;gap:.8rem;">
      <button class="btn btn-orange" onclick="anteriorEmocao()" style="font-size:.85rem;">← ANTERIOR</button>
      <button class="btn btn-orange" onclick="proximaEmocao()" style="font-size:.85rem;">PRÓXIMA →</button>
    </div>
  </div>
</div>

<div id="reforco">
  <div class="rf-ico" id="rf-ico">⭐</div>
  <div class="rf-txt" id="rf-txt">MUITO BEM!</div>
</div>
<div id="confetti-overlay"></div>

<script src="js/sounds.js"></script>
<script>
const EMOCOES = [
  { e:'😊', nome:'FELIZ',      cor:'#4ade80',
    desc:'Quando estamos felizes, sorrimos muito e nos sentimos bem por dentro.',
    sit:'Quando ganho um presente, me sinto feliz!' },
  { e:'😢', nome:'TRISTE',     cor:'#60a5fa',
    desc:'Quando estamos tristes, podemos chorar. O coração parece pesado.',
    sit:'Quando perco um brinquedo favorito, fico triste.' },
  { e:'😡', nome:'BRAVO',      cor:'#ef4444',
    desc:'Quando estamos bravos, sentimos uma energia forte por dentro. Precisamos respirar fundo.',
    sit:'Quando alguém me machuca, posso ficar bravo.' },
  { e:'😨', nome:'COM MEDO',   cor:'#8b5cf6',
    desc:'O medo aparece quando algo parece perigoso. O coração bate mais rápido.',
    sit:'Na hora de dormir no escuro, posso sentir medo.' },
  { e:'😲', nome:'SURPRESO',   cor:'#facc15',
    desc:'A surpresa acontece quando algo inesperado aparece. Os olhos ficam bem abertos!',
    sit:'Quando ganhei uma festa surpresa, fiquei muito surpreso!' },
  { e:'🥰', nome:'AMOR',       cor:'#f472b6',
    desc:'O amor é um sentimento quentinho. Sentimos quando gostamos muito de alguém.',
    sit:'Quando abraço minha família, sinto muito amor.' },
  { e:'😴', nome:'CANSADO',    cor:'#94a3b8',
    desc:'O cansaço vem depois de muita atividade. Os olhos pesam e queremos descansar.',
    sit:'Depois de brincar muito, fico cansado.' },
  { e:'🤢', nome:'MAL',        cor:'#a3e635',
    desc:'Quando estamos mal, o corpo dói ou a barriga estraga. Precisamos de cuidado.',
    sit:'Quando como algo estragado, fico mal.' },
  { e:'😤', nome:'FRUSTRADO',  cor:'#fb923c',
    desc:'A frustração aparece quando algo não sai como queremos. É normal sentir isso.',
    sit:'Quando não consigo montar o quebra-cabeça, fico frustrado.' },
  { e:'🤩', nome:'ANIMADO',    cor:'#facc15',
    desc:'A animação é uma energia boa! Quando estamos animados, queremos dançar e pular.',
    sit:'No dia do meu aniversário, fico super animado!' },
];

let modo = 'quiz', emocaoIdx = 0, pontos = 0, bloqueado = false;

function setModo(m, el) {
  modo = m;
  document.querySelectorAll('.modo-btn').forEach(b => b.classList.remove('ativo'));
  el.classList.add('ativo');
  if (m === 'quiz') {
    document.getElementById('area-quiz').style.display = 'flex';
    document.getElementById('area-quiz').style.flexDirection = 'column';
    document.getElementById('area-quiz').style.alignItems = 'center';
    document.getElementById('area-quiz').style.gap = '.8rem';
    document.getElementById('area-quiz').style.width = '100%';
    document.getElementById('area-aprender').style.display = 'none';
    document.getElementById('instrucao').querySelector('.txt').textContent = 'Como essa pessoa está se sentindo?';
    proximaRodada();
  } else {
    document.getElementById('area-quiz').style.display = 'none';
    document.getElementById('area-aprender').style.display = 'flex';
    document.getElementById('instrucao').querySelector('.txt').textContent = 'Aprenda sobre cada emoção';
    emocaoIdx = 0; mostrarEmocaoAprender();
  }
}

function proximaRodada() {
  bloqueado = false;
  const pool = [...EMOCOES].sort(() => Math.random()-.5);
  const alvo = pool[0];
  const opcoes = pool.slice(0, 4).sort(() => Math.random()-.5);

  document.getElementById('rosto-display').textContent = alvo.e;
  document.getElementById('pergunta').textContent = 'Como essa pessoa está se sentindo?';
  falar('Como essa pessoa está se sentindo?');
  setTimeout(() => falar(alvo.nome), 1500);

  const cols = opcoes.length <= 2 ? 2 : opcoes.length <= 3 ? 3 : 2;
  const grid = document.getElementById('emocoes-grid');
  grid.style.gridTemplateColumns = `repeat(${cols}, minmax(100px, 130px))`;
  grid.innerHTML = '';
  opcoes.forEach(em => {
    const btn = document.createElement('div');
    btn.className = 'emocao-btn';
    btn.innerHTML = `<div class="em-ico">${em.e}</div><div class="em-txt">${em.nome}</div>`;
    btn.addEventListener('click', () => responder(em, alvo, btn));
    grid.appendChild(btn);
  });
}

function responder(escolhida, alvo, btn) {
  if (bloqueado) return;
  bloqueado = true;
  if (escolhida.nome === alvo.nome) {
    btn.classList.add('correta');
    SFX.acerto(); pontos += 10;
    document.getElementById('score-badge').textContent = '⭐ ' + pontos;
    confetti();
    document.getElementById('rf-ico').textContent = alvo.e;
    document.getElementById('rf-txt').textContent = alvo.nome + '!\n' + (alvo.sit || '');
    document.getElementById('reforco').classList.add('show');
    falar('Correto! ' + alvo.nome + '. ' + (alvo.sit || ''));
    setTimeout(() => { document.getElementById('reforco').classList.remove('show'); proximaRodada(); }, 2500);
  } else {
    btn.classList.add('errada');
    btn.addEventListener('animationend', () => btn.classList.remove('errada'), {once:true});
    bloqueado = false;
    falar('Tente novamente');
  }
}

function mostrarEmocaoAprender() {
  const em = EMOCOES[emocaoIdx];
  falar(em.nome + '. ' + em.desc);
  document.getElementById('aprender-card').innerHTML = `
    <div class="aprend-emoji">${em.e}</div>
    <div class="aprend-nome" style="color:${em.cor};">${em.nome}</div>
    <div class="aprend-desc">${em.desc}</div>
    <div class="aprend-situacao">"${em.sit}"</div>`;
}
function proximaEmocao()   { emocaoIdx=(emocaoIdx+1)%EMOCOES.length; mostrarEmocaoAprender(); SFX.click(); }
function anteriorEmocao()  { emocaoIdx=(emocaoIdx-1+EMOCOES.length)%EMOCOES.length; mostrarEmocaoAprender(); SFX.click(); }

function confetti() {
  const ov = document.getElementById('confetti-overlay');
  ['#4ade80','#facc15','#f472b6','#60a5fa','#fb923c'].forEach(c => {
    for(let i=0;i<7;i++){
      const p=document.createElement('div'); p.className='confetti-p';
      p.style.left=Math.random()*100+'vw'; p.style.background=c;
      p.style.animationDuration=(1.2+Math.random()*1.5)+'s';
      p.style.animationDelay=Math.random()*0.4+'s';
      ov.appendChild(p); setTimeout(()=>p.remove(),3000);
    }
  });
}

proximaRodada();
</script>
</body>
</html>
