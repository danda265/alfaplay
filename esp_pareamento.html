<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pareamento вҖ” AlfaPlay Especial</title>
<link rel="stylesheet" href="css/game.css"/>
<style>
  body{display:flex;flex-direction:column;min-height:100vh;background:#0a1628;}
  .main{flex:1;padding:1.2rem;display:flex;flex-direction:column;align-items:center;gap:1.4rem;max-width:600px;margin:0 auto;width:100%;}

  /* InstruГ§ГЈo visual clara */
  .instrucao{background:var(--dark2);border:2px solid #3b82f6;border-radius:14px;
    padding:1rem 1.4rem;text-align:center;width:100%;}
  .instrucao .txt{font-size:1.1rem;color:#e2e8f0;font-weight:700;}
  .instrucao .sub{font-size:.8rem;color:#64748b;margin-top:.3rem;}

  /* Alvo вҖ” imagem grande a encontrar */
  .alvo-wrap{display:flex;flex-direction:column;align-items:center;gap:.6rem;}
  .alvo-label{font-family:var(--pixel);font-size:.5rem;color:#60a5fa;}
  .alvo-card{width:130px;height:130px;background:var(--dark2);border:4px solid #60a5fa;
    border-radius:20px;display:flex;align-items:center;justify-content:center;
    font-size:4.5rem;box-shadow:0 0 20px rgba(96,165,250,.3);animation:pulse-glow 2s infinite;}
  @keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(96,165,250,.3)}50%{box-shadow:0 0 35px rgba(96,165,250,.6)}}

  /* Grade de opГ§Гөes */
  .opcoes-grid{display:grid;gap:.8rem;justify-content:center;width:100%;}
  .opcao{background:var(--dark2);border:4px solid var(--border);border-radius:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:3.8rem;transition:transform .12s,border-color .15s,background .15s;
    box-shadow:0 4px 0 rgba(0,0,0,.4);user-select:none;}
  .opcao:hover{transform:scale(1.06);border-color:#60a5fa;}
  .opcao:active{transform:scale(.96);}
  .opcao.correta{border-color:#4ade80;background:rgba(74,222,128,.2);animation:bounce .4s ease;}
  .opcao.errada{border-color:#f87171;background:rgba(248,113,113,.15);animation:shake .3s ease;}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  /* ReforГ§o positivo */
  #reforco{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;
    display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
  #reforco.show{display:flex;}
  .reforco-ico{font-size:6rem;animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .reforco-txt{font-family:var(--pixel);font-size:clamp(.9rem,4vw,1.4rem);color:#facc15;
    text-shadow:3px 3px 0 #000;text-align:center;line-height:1.8;}

  /* NГӯvel / dificuldade */
  .nivel-btns{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
  .nivel-btn{font-family:var(--pixel);font-size:.45rem;padding:.5em 1em;
    border-radius:99px;border:2px solid var(--border);background:var(--dark3);
    color:var(--text);cursor:pointer;transition:border-color .15s;}
  .nivel-btn.ativo{border-color:#60a5fa;background:rgba(96,165,250,.15);color:#60a5fa;}

  /* Progresso visual (estrelinhas) */
  .estrelas{display:flex;gap:.4rem;font-size:1.6rem;}
</style>
</head>
<body>
<header class="game-header">
  <a href="especial.html" class="btn btn-gray" style="font-size:.8rem;">вҶҗ VOLTAR</a>
  <span class="pixel-title" style="color:#60a5fa;">рҹ”Қ PAREAMENTO</span>
  <div class="score-badge" id="score-badge">вӯҗ 0</div>
</header>

<div class="main">
  <div class="instrucao">
    <div class="txt">рҹ‘Ҷ Toque na figura IGUAL</div>
    <div class="sub">Encontre a mesma imagem do modelo</div>
  </div>

  <div class="nivel-btns">
    <button class="nivel-btn ativo" onclick="setNivel(2,this)">рҹҹў 2 OPГҮГ•ES</button>
    <button class="nivel-btn"       onclick="setNivel(3,this)">рҹ”ө 3 OPГҮГ•ES</button>
    <button class="nivel-btn"       onclick="setNivel(4,this)">рҹҹЈ 4 OPГҮГ•ES</button>
  </div>

  <div class="alvo-wrap">
    <div class="alvo-label">ENCONTRE ESTA:</div>
    <div class="alvo-card" id="alvo">вқ“</div>
  </div>

  <div class="opcoes-grid" id="opcoes"></div>

  <div class="estrelas" id="estrelas"></div>
</div>

<div id="reforco">
  <div class="reforco-ico" id="reforco-ico">вӯҗ</div>
  <div class="reforco-txt" id="reforco-txt">MUITO BEM!</div>
</div>
<div id="confetti-overlay"></div>

<script src="js/sounds.js"></script>
<script>
// Pool de itens com emoji + nome falado
const ITENS = [
  {e:'рҹҗұ',n:'gato'},{e:'рҹҗ¶',n:'cachorro'},{e:'рҹҗё',n:'sapo'},{e:'рҹҗ„',n:'vaca'},
  {e:'рҹҰҒ',n:'leГЈo'},{e:'рҹҗӯ',n:'rato'},{e:'рҹҗҹ',n:'peixe'},{e:'рҹҰӢ',n:'borboleta'},
  {e:'вҡҪ',n:'bola'},{e:'рҹҸ ',n:'casa'},{e:'рҹҢё',n:'flor'},{e:'рҹҚү',n:'melancia'},
  {e:'рҹҺӮ',n:'bolo'},{e:'рҹҡҖ',n:'foguete'},{e:'рҹҺё',n:'guitarra'},{e:'рҹҢ»',n:'girassol'},
  {e:'вқӨпёҸ',n:'coraГ§ГЈo'},{e:'рҹҢҲ',n:'arco-Гӯris'},{e:'рҹҗҳ',n:'elefante'},{e:'рҹҚ«',n:'chocolate'},
  {e:'рҹҰҶ',n:'pato'},{e:'рҹҗ”',n:'galinha'},{e:'рҹҺҒ',n:'presente'},{e:'рҹҸ°',n:'castelo'},
];

let nivel = 2, pontos = 0, acertos = 0, alvoAtual = null, bloqueado = false;
const FRASES = ['MUITO BEM! рҹҺү','INCRГҚVEL! вӯҗ','PARABГүNS! рҹҸҶ','QUE LEGAL! рҹҢҹ','ARRASOU! рҹ’«','PERFEITO! рҹ‘Ҹ'];

function setNivel(n, el) {
  nivel = n;
  document.querySelectorAll('.nivel-btn').forEach(b => b.classList.remove('ativo'));
  el.classList.add('ativo');
  proximaRodada();
}

function proximaRodada() {
  bloqueado = false;
  // Escolhe alvo
  const pool = [...ITENS].sort(() => Math.random()-.5);
  alvoAtual = pool[0];
  const distractors = pool.slice(1, nivel);
  const opcoes = [alvoAtual, ...distractors].sort(() => Math.random()-.5);

  document.getElementById('alvo').textContent = alvoAtual.e;
  falar(alvoAtual.n);

  // Tamanho das opГ§Гөes baseado no nГӯvel
  const sz = nivel === 2 ? '130px' : nivel === 3 ? '110px' : '95px';
  const cols = nivel === 4 ? 2 : nivel;
  const grid = document.getElementById('opcoes');
  grid.style.gridTemplateColumns = `repeat(${cols}, ${sz})`;
  grid.innerHTML = '';

  opcoes.forEach(item => {
    const div = document.createElement('div');
    div.className = 'opcao';
    div.style.width = div.style.height = sz;
    div.style.fontSize = nivel === 2 ? '4rem' : '3.2rem';
    div.textContent = item.e;
    div.addEventListener('click', () => responder(item, div));
    grid.appendChild(div);
  });
}

function responder(item, el) {
  if (bloqueado) return;
  bloqueado = true;
  if (item.e === alvoAtual.e) {
    // ACERTO
    el.classList.add('correta');
    SFX.acerto();
    pontos += nivel * 5;
    acertos++;
    document.getElementById('score-badge').textContent = 'вӯҗ ' + pontos;
    atualizarEstrelas();
    mostrarReforco();
    falar(FRASES[Math.floor(Math.random()*FRASES.length)].replace(/[^A-Za-zГЎГ ГўГЈГ©ГЁГӘГӯГ¬Г®ГіГІГҙГөГәГ№Г»Г§!]/g,' ').trim());
    setTimeout(proximaRodada, 2000);
  } else {
    // ERRO вҖ” sem som negativo, apenas vibraГ§ГЈo visual suave
    el.classList.add('errada');
    // Destaca a correta
    setTimeout(() => {
      document.querySelectorAll('.opcao').forEach(o => {
        if (o.textContent === alvoAtual.e) {
          o.style.borderColor = '#4ade80';
          o.style.background = 'rgba(74,222,128,.15)';
        }
      });
      bloqueado = false;
    }, 600);
    el.addEventListener('animationend', () => el.classList.remove('errada'), {once:true});
  }
}

function mostrarReforco() {
  const ICOS = ['рҹҢҹ','вӯҗ','рҹҸҶ','рҹҺү','рҹ’«','рҹҺҠ'];
  const r = document.getElementById('reforco');
  document.getElementById('reforco-ico').textContent = ICOS[Math.floor(Math.random()*ICOS.length)];
  document.getElementById('reforco-txt').textContent = FRASES[Math.floor(Math.random()*FRASES.length)];
  r.classList.add('show');
  confetti();
  setTimeout(() => r.classList.remove('show'), 1600);
}

function atualizarEstrelas() {
  const el = document.getElementById('estrelas');
  el.innerHTML = 'вӯҗ'.repeat(Math.min(acertos, 10));
}

function confetti() {
  const ov = document.getElementById('confetti-overlay');
  ['#4ade80','#60a5fa','#f472b6','#facc15','#fb923c'].forEach(c => {
    for(let i=0;i<8;i++){
      const p=document.createElement('div'); p.className='confetti-p';
      p.style.left=Math.random()*100+'vw';
      p.style.background=c;
      p.style.animationDuration=(1.2+Math.random()*1.5)+'s';
      p.style.animationDelay=Math.random()*0.4+'s';
      ov.appendChild(p); setTimeout(()=>p.remove(),3000);
    }
  });
}

proximaRodada();
</script>
</body>
</html>
