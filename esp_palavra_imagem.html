<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Palavra + Imagem — AlfaPlay Especial</title>
<link rel="stylesheet" href="css/game.css"/>
<style>
  body{display:flex;flex-direction:column;min-height:100vh;background:#0a1628;}
  .main{flex:1;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:560px;margin:0 auto;width:100%;}
  .instrucao{background:var(--dark2);border:2px solid #c084fc;border-radius:14px;padding:.8rem 1.2rem;text-align:center;width:100%;}
  .instrucao .txt{font-size:1.05rem;color:#e2e8f0;font-weight:700;}
  .instrucao .sub{font-size:.78rem;color:#64748b;margin-top:.2rem;}

  /* Modos */
  .modo-btns{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
  .modo-btn{font-family:var(--pixel);font-size:.42rem;padding:.4em .9em;border-radius:99px;
    border:2px solid var(--border);background:var(--dark3);color:var(--text);cursor:pointer;transition:all .15s;}
  .modo-btn.ativo{border-color:#c084fc;background:rgba(192,132,252,.15);color:#c084fc;}

  /* MODO 1: Imagem → Palavra */
  .palavra-display{font-family:var(--pixel);font-size:clamp(1.2rem,5vw,2rem);color:#facc15;
    text-shadow:3px 3px 0 #000;text-align:center;letter-spacing:4px;}

  /* Card central grande */
  .card-central{background:var(--dark2);border:4px solid #c084fc;border-radius:22px;
    padding:1.5rem;display:flex;flex-direction:column;align-items:center;gap:.8rem;
    box-shadow:0 0 24px rgba(192,132,252,.25);width:100%;max-width:320px;}
  .card-central .emoji-g{font-size:clamp(4rem,15vw,7rem);line-height:1;}
  .card-central .palavra-g{font-family:var(--pixel);font-size:clamp(.8rem,3vw,1.2rem);
    color:#ffffff;letter-spacing:6px;text-shadow:2px 2px 0 #000;}
  .card-central .silabas{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;}
  .silaba-chip{background:rgba(192,132,252,.2);border:2px solid #c084fc;border-radius:8px;
    font-family:var(--pixel);font-size:.55rem;color:#c084fc;padding:.3em .6em;}

  /* Opções texto/imagem */
  .opcoes-grid{display:grid;gap:.7rem;width:100%;justify-content:center;}
  .opcao-card{background:var(--dark2);border:3px solid var(--border);border-radius:14px;
    padding:.8rem .6rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.4rem;
    transition:transform .12s,border-color .15s;box-shadow:0 3px 0 rgba(0,0,0,.4);}
  .opcao-card:hover{transform:scale(1.05);border-color:#c084fc;}
  .opcao-card .op-emoji{font-size:2.8rem;line-height:1;}
  .opcao-card .op-txt{font-family:var(--pixel);font-size:.42rem;color:#94a3b8;text-align:center;}
  .opcao-card.correta{border-color:#4ade80;background:rgba(74,222,128,.15);animation:bounce .4s ease;}
  .opcao-card.errada{border-color:#f87171;background:rgba(248,113,113,.12);animation:shake .3s ease;}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  /* Modo leitura global — cartões para revirar */
  .leitura-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem;width:100%;max-width:380px;}
  .leitura-card{background:var(--dark2);border:3px solid var(--border);border-radius:16px;
    padding:1rem .8rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.5rem;
    min-height:110px;transition:transform .12s,border-color .15s;box-shadow:0 3px 0 rgba(0,0,0,.4);}
  .leitura-card:hover{transform:scale(1.04);border-color:#c084fc;}
  .lc-emoji{font-size:2.5rem;line-height:1;}
  .lc-palavra{font-family:var(--pixel);font-size:.5rem;color:#c084fc;text-align:center;letter-spacing:2px;}
  .lc-silabas{font-family:var(--pixel);font-size:.38rem;color:#64748b;text-align:center;}

  /* Reforço */
  #reforco{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;
    align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
  #reforco.show{display:flex;}
  .rf-ico{font-size:5rem;animation:pop .4s ease;}
  .rf-txt{font-family:var(--pixel);font-size:clamp(.8rem,3.5vw,1.2rem);color:#facc15;
    text-shadow:3px 3px 0 #000;text-align:center;line-height:1.8;}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
</style>
</head>
<body>
<header class="game-header">
  <a href="especial.html" class="btn btn-gray" style="font-size:.8rem;">← VOLTAR</a>
  <span class="pixel-title" style="color:#c084fc;">🖼️ PALAVRA + IMAGEM</span>
  <div class="score-badge" id="score-badge">⭐ 0</div>
</header>

<div class="main">
  <div class="instrucao" id="instrucao">
    <div class="txt" id="instr-txt">Qual é o nome desta figura?</div>
    <div class="sub" id="instr-sub">Toque na palavra certa</div>
  </div>

  <div class="modo-btns">
    <button class="modo-btn ativo" onclick="setModo('imagem_palavra',this)">🖼️→📝 FIGURA→PALAVRA</button>
    <button class="modo-btn"       onclick="setModo('palavra_imagem',this)">📝→🖼️ PALAVRA→FIGURA</button>
    <button class="modo-btn"       onclick="setModo('leitura',this)">📖 LEITURA GLOBAL</button>
  </div>

  <div id="area-jogo" style="display:flex;flex-direction:column;align-items:center;gap:1rem;width:100%;"></div>
</div>

<div id="reforco">
  <div class="rf-ico" id="rf-ico">⭐</div>
  <div class="rf-txt" id="rf-txt">MUITO BEM!</div>
</div>
<div id="confetti-overlay"></div>

<script src="js/data.js"></script>
<script src="js/sounds.js"></script>
<script>
// Banco de palavras com sílabas coloridas
const BANCO = [
  {e:'🐱',p:'GATO',    s:['GA','TO']},       {e:'🐶',p:'CACHORRO', s:['CA','CHOR','RO']},
  {e:'⚽',p:'BOLA',    s:['BO','LA']},       {e:'🏠',p:'CASA',     s:['CA','SA']},
  {e:'🐸',p:'SAPO',    s:['SA','PO']},       {e:'🦁',p:'LEÃO',     s:['LE','ÃO']},
  {e:'🌸',p:'FLOR',    s:['FLOR']},          {e:'🍉',p:'MELANCIA', s:['ME','LAN','CI','A']},
  {e:'🎂',p:'BOLO',    s:['BO','LO']},       {e:'🚀',p:'FOGUETE',  s:['FO','GUE','TE']},
  {e:'🦋',p:'BORBOLETA',s:['BOR','BO','LE','TA']},{e:'🌻',p:'GIRASSOL',s:['GI','RAS','SOL']},
  {e:'❤️',p:'CORAÇÃO', s:['CO','RA','ÇÃO']}, {e:'🐘',p:'ELEFANTE', s:['E','LE','FAN','TE']},
  {e:'🍫',p:'CHOCOLATE',s:['CHO','CO','LA','TE']},{e:'🌈',p:'ARCO-ÍRIS',s:['AR','CO','Í','RIS']},
];

let modo='imagem_palavra', pontos=0, bloqueado=false;
const COR_SIL=['#c084fc','#60a5fa','#4ade80','#f472b6','#facc15','#fb923c'];

function setModo(m, el) {
  modo=m;
  document.querySelectorAll('.modo-btn').forEach(b=>b.classList.remove('ativo'));
  el.classList.add('ativo');
  if(m==='leitura') mostrarLeitura();
  else proximaRodada();
}

function proximaRodada() {
  bloqueado=false;
  const pool=[...BANCO].sort(()=>Math.random()-.5);
  const alvo=pool[0];
  const distratores=pool.slice(1,3);
  const area=document.getElementById('area-jogo');
  area.innerHTML='';

  if(modo==='imagem_palavra') {
    document.getElementById('instr-txt').textContent='Qual é o nome desta figura?';
    document.getElementById('instr-sub').textContent='Toque na palavra certa';
    falar(alvo.p);
    // Card central com emoji
    const card=document.createElement('div');
    card.className='card-central';
    card.innerHTML=`<div class="emoji-g">${alvo.e}</div>`;
    card.onclick=()=>falar(alvo.p);
    area.appendChild(card);
    // Opções de palavras
    const opcoes=[alvo,...distratores].sort(()=>Math.random()-.5);
    const grid=document.createElement('div');
    grid.className='opcoes-grid';
    grid.style.gridTemplateColumns=`repeat(${Math.min(opcoes.length,3)},1fr)`;
    opcoes.forEach(op=>{
      const b=document.createElement('div');
      b.className='opcao-card';
      b.innerHTML=`<div class="op-txt" style="font-size:.65rem;letter-spacing:2px;color:#e2e8f0;">${op.p}</div>`;
      b.addEventListener('click',()=>responder(op,alvo,b));
      grid.appendChild(b);
    });
    area.appendChild(grid);
  } else {
    document.getElementById('instr-txt').textContent='Qual figura representa esta palavra?';
    document.getElementById('instr-sub').textContent='Toque na figura certa';
    // Mostra a palavra com sílabas coloridas
    const card=document.createElement('div');
    card.className='card-central';
    const silHtml=alvo.s.map((s,i)=>`<span class="silaba-chip" style="border-color:${COR_SIL[i%COR_SIL.length]};color:${COR_SIL[i%COR_SIL.length]};background:${COR_SIL[i%COR_SIL.length]}22;">${s}</span>`).join('');
    card.innerHTML=`<div class="palavra-g">${alvo.p}</div><div class="silabas">${silHtml}</div>`;
    card.onclick=()=>falar(alvo.p);
    area.appendChild(card);
    falar(alvo.p);
    // Opções com emoji
    const opcoes=[alvo,...distratores].sort(()=>Math.random()-.5);
    const grid=document.createElement('div');
    grid.className='opcoes-grid';
    grid.style.gridTemplateColumns=`repeat(${Math.min(opcoes.length,3)},1fr)`;
    opcoes.forEach(op=>{
      const b=document.createElement('div');
      b.className='opcao-card';
      b.innerHTML=`<div class="op-emoji">${op.e}</div>`;
      b.addEventListener('click',()=>responder(op,alvo,b));
      grid.appendChild(b);
    });
    area.appendChild(grid);
  }
}

function responder(escolhida, alvo, btn) {
  if(bloqueado) return;
  bloqueado=true;
  if(escolhida.p===alvo.p) {
    btn.classList.add('correta');
    SFX.acerto(); pontos+=10;
    document.getElementById('score-badge').textContent='⭐ '+pontos;
    confetti();
    document.getElementById('rf-ico').textContent=alvo.e;
    document.getElementById('rf-txt').textContent=alvo.p+'!\n'+alvo.s.join(' · ');
    document.getElementById('reforco').classList.add('show');
    falar('Correto! '+alvo.p+'. '+alvo.s.join(', '));
    setTimeout(()=>{document.getElementById('reforco').classList.remove('show');proximaRodada();},2200);
  } else {
    btn.classList.add('errada');
    btn.addEventListener('animationend',()=>btn.classList.remove('errada'),{once:true});
    bloqueado=false;
    falar(alvo.p);
  }
}

function mostrarLeitura() {
  document.getElementById('instr-txt').textContent='Toque para ouvir cada palavra';
  document.getElementById('instr-sub').textContent='Imagem + Palavra + Sílabas';
  const area=document.getElementById('area-jogo');
  area.innerHTML='';
  const pool=[...BANCO].sort(()=>Math.random()-.5).slice(0,8);
  const grid=document.createElement('div');
  grid.className='leitura-grid';
  pool.forEach(item=>{
    const c=document.createElement('div');
    c.className='leitura-card';
    const silHtml=item.s.map((s,i)=>`<span style="color:${COR_SIL[i%COR_SIL.length]};">${s}</span>`).join('-');
    c.innerHTML=`<div class="lc-emoji">${item.e}</div><div class="lc-palavra">${item.p}</div><div class="lc-silabas">${silHtml}</div>`;
    c.addEventListener('click',()=>{falar(item.p); SFX.click(); c.style.borderColor='#c084fc'; setTimeout(()=>c.style.borderColor='',800);});
    grid.appendChild(c);
  });
  area.appendChild(grid);
  const btn=document.createElement('button');
  btn.className='btn btn-purple';
  btn.textContent='🔄 NOVAS PALAVRAS';
  btn.style.marginTop='.5rem';
  btn.onclick=mostrarLeitura;
  area.appendChild(btn);
}

function confetti() {
  const ov=document.getElementById('confetti-overlay');
  ['#c084fc','#facc15','#4ade80','#60a5fa','#f472b6'].forEach(c=>{
    for(let i=0;i<7;i++){
      const p=document.createElement('div'); p.className='confetti-p';
      p.style.left=Math.random()*100+'vw'; p.style.background=c;
      p.style.animationDuration=(1.2+Math.random()*1.5)+'s';
      p.style.animationDelay=Math.random()*0.4+'s';
      ov.appendChild(p); setTimeout(()=>p.remove(),3000);
    }
  });
}

proximaRodada();
</script>
</body>
</html>
