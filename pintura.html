<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pintura — AlfaPlay</title>
<link rel="stylesheet" href="css/game.css"/>
<style>
  body{display:flex;flex-direction:column;min-height:100vh;}
  .main{flex:1;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:1rem;}

  /* Seletor de desenhos */
  .desenhos-scroll{display:flex;gap:.6rem;overflow-x:auto;padding:.4rem .2rem;width:100%;max-width:560px;scrollbar-width:thin;}
  .desenho-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.3rem;background:var(--dark2);
    border:2px solid var(--border);border-radius:10px;padding:.5rem .7rem;cursor:pointer;transition:border-color .15s;}
  .desenho-btn:hover,.desenho-btn.ativo{border-color:var(--yellow);}
  .desenho-btn .ico{font-size:1.8rem;}
  .desenho-btn .nm{font-family:var(--pixel);font-size:.4rem;color:#94a3b8;}

  /* SVG área */
  #svg-wrap{background:var(--bg-tema,#f8fafc);border-radius:16px;border:3px solid var(--border);
    overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.4);width:min(380px,96vw);height:min(380px,96vw);}
  #svg-wrap svg{width:100%;height:100%;display:block;}
  .regiao{cursor:pointer;transition:filter .1s;}
  .regiao:hover{filter:brightness(1.15);}

  /* Paleta */
  .paleta-wrap{width:100%;max-width:400px;}
  .paleta-titulo{font-family:var(--pixel);font-size:.45rem;color:#64748b;margin-bottom:.5rem;text-align:center;}
  .paleta{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;}
  .cor-btn{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;
    transition:transform .1s,border-color .1s;box-shadow:2px 2px 0 rgba(0,0,0,.5);}
  .cor-btn:hover{transform:scale(1.15);}
  .cor-btn.ativa{border-color:#fff;transform:scale(1.2);}

  /* Ferramentas */
  .tools{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}

  /* Fundos temáticos */
  .fundos-titulo{font-family:var(--pixel);font-size:.45rem;color:#64748b;text-align:center;}
  .fundos{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;}
  .fundo-btn{padding:.4em .9em;border-radius:8px;font-size:.75rem;border:2px solid var(--border);
    background:var(--dark3);color:var(--text);cursor:pointer;transition:border-color .15s;}
  .fundo-btn:hover,.fundo-btn.ativo{border-color:var(--yellow);background:rgba(250,204,21,.1);}
</style>
</head>
<body>
<header class="game-header">
  <a href="index.html" class="btn btn-gray" style="font-size:.8rem;">← VOLTAR</a>
  <span class="pixel-title" style="color:#fb923c;">🖌️ PINTURA</span>
  <div style="display:flex;gap:.5rem;">
    <button class="btn btn-gray"  style="font-size:.75rem;" onclick="limpar()">🗑️ LIMPAR</button>
    <button class="btn btn-green" style="font-size:.75rem;" onclick="salvar()">💾 SALVAR</button>
  </div>
</header>

<div class="main">

  <!-- Seletor de desenhos -->
  <div class="desenhos-scroll" id="desenhos-scroll"></div>

  <!-- Fundos -->
  <div>
    <p class="fundos-titulo">🌈 FUNDO</p>
    <div class="fundos" id="fundos"></div>
  </div>

  <!-- SVG colorir -->
  <div id="svg-wrap"><svg id="svg-colorir" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg></div>

  <!-- Paleta -->
  <div class="paleta-wrap">
    <p class="paleta-titulo">🎨 CORES</p>
    <div class="paleta" id="paleta"></div>
  </div>

  <!-- Ferramentas extras -->
  <div class="tools">
    <button class="btn btn-orange" onclick="desfazer()" style="font-size:.8rem;">↩️ DESFAZER</button>
    <button class="btn btn-pink"   onclick="falarNome()" style="font-size:.8rem;">🔊 OUVIR</button>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/sounds.js"></script>

const CORES = [
  '#000000','#ffffff','#ef4444','#f97316','#facc15','#84cc16',
  '#22c55e','#14b8a6','#06b6d4','#3b82f6','#8b5cf6','#ec4899',
  '#fca5a5','#fed7aa','#fef08a','#bbf7d0','#bae6fd','#e9d5ff',
  '#92400e','#065f46','#1e3a5f','#fef9c3','#f1f5f9','#334155',
];
let corAtual = '#ef4444';

const paletaEl = document.getElementById('paleta');
CORES.forEach(c => {
  const b = document.createElement('button');
  b.className = 'cor-btn' + (c === corAtual ? ' ativa' : '');
  b.style.background = c;
  if (c === '#ffffff' || c === '#fef9c3' || c === '#fef08a' || c === '#f1f5f9')
    b.style.border = '3px solid #475569';
  b.onclick = () => {
    document.querySelectorAll('.cor-btn').forEach(x => x.classList.remove('ativa'));
    b.classList.add('ativa'); corAtual = c; SFX.click();
  };
  paletaEl.appendChild(b);
});

  {id:'branco', nome:'⬜ BRANCO',   bg:'#f8fafc'},

  {id:'oceano', nome:'🌊 OCEANO',   bg:'linear-gradient(180deg,#0ea5e9 0%,#0369a1 50%,#164e63 100%)'},
  {id:'floresta',nome:'🌲 FLORESTA',bg:'linear-gradient(180deg,#4ade80 0%,#16a34a 50%,#14532d 100%)'},
  {id:'sunset', nome:'🌅 PÔR DO SOL',bg:'linear-gradient(180deg,#fb923c 0%,#f97316 40%,#fbbf24 100%)'},
];
let fundoAtual = 'branco';

const fundosEl = document.getElementById('fundos');
FUNDOS.forEach(f => {
  const b = document.createElement('button');
  b.className = 'fundo-btn' + (f.id === 'branco' ? ' ativo' : '');
  b.textContent = f.nome; b.dataset.id = f.id;
  b.onclick = () => {
    fundoAtual = f.id;
    document.querySelectorAll('.fundo-btn').forEach(x => x.classList.remove('ativo'));
    b.classList.add('ativo');
    document.getElementById('svg-wrap').style.background = f.bg;
    SFX.click();
  };
  fundosEl.appendChild(b);
});

// ── Montar seletor de desenhos ─────────────────────────────────
let desenhoAtual = DESENHOS[0];
const scrollEl = document.getElementById('desenhos-scroll');
DESENHOS.forEach(d => {
  const b = document.createElement('div');
  b.className = 'desenho-btn' + (d.id === desenhoAtual.id ? ' ativo' : '');
  b.dataset.id = d.id;
  b.innerHTML = `<div class="ico">${d.emoji}</div><div class="nm">${d.nome}</div>`;
  b.onclick = () => carregarDesenho(d.id);
  scrollEl.appendChild(b);
});

// ── Histórico para desfazer ────────────────────────────────────
let historico = [];
function salvarEstado() {
  const regioes = document.querySelectorAll('.regiao');
  historico.push([...regioes].map(r => r.getAttribute('fill')));
}
function desfazer() {
  if (!historico.length) return;
  const estado = historico.pop();
  const regioes = document.querySelectorAll('.regiao');
  regioes.forEach((r,i) => { if (estado[i]) r.setAttribute('fill', estado[i]); });
  SFX.flip();
}

// ── Carregar desenho ───────────────────────────────────────────
function carregarDesenho(id) {
  const d = DESENHOS.find(x => x.id === id);
  if (!d) return;
  desenhoAtual = d;
  historico = [];
  document.querySelectorAll('.desenho-btn').forEach(b =>
    b.classList.toggle('ativo', b.dataset.id === id));
  const svg = document.getElementById('svg-colorir');
  svg.innerHTML = d.svg;
  svg.querySelectorAll('.regiao').forEach(el => {
    el.addEventListener('click', () => {
      salvarEstado();
      el.setAttribute('fill', corAtual);
      SFX.click();
    });
  });
  falar(d.nome);
  SFX.click();
}

// ── Limpar ─────────────────────────────────────────────────────
function limpar() {
  salvarEstado();
  carregarDesenho(desenhoAtual.id);
  toast('🗑️ LIMPO!', 'info');
}

// ── Falar nome ─────────────────────────────────────────────────
function falarNome() { falar(desenhoAtual.nome); }

// ── Salvar como PNG ────────────────────────────────────────────
function salvar() {
  const wrap = document.getElementById('svg-wrap');
  const svg = document.getElementById('svg-colorir');
  const fundo = FUNDOS.find(f => f.id === fundoAtual)?.bg || '#f8fafc';

  // Serializa SVG
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = c.height = 380;
    const ctx = c.getContext('2d');
    // Fundo
    if (fundo.startsWith('linear')) {
      // Usa cor sólida como fallback
      ctx.fillStyle = '#87ceeb';
    } else {
      ctx.fillStyle = fundo;
    }
    ctx.fillRect(0,0,380,380);
    ctx.drawImage(img, 0, 0, 380, 380);
    URL.revokeObjectURL(url);
    const link = document.createElement('a');
    link.download = `alfaplay-${desenhoAtual.nome.toLowerCase()}.png`;
    link.href = c.toDataURL('image/png');
    link.click();
    SFX.acerto();
    toast('💾 IMAGEM SALVA!', 'acerto');
  };
  img.src = url;
}

function toast(msg, tipo) {
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = 'toast ' + tipo; d.textContent = msg;
  c.appendChild(d); setTimeout(() => d.remove(), 2200);
}

// ── Iniciar ────────────────────────────────────────────────────
carregarDesenho(DESENHOS[0].id);
