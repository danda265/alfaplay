<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quebra-Cabeça — AlfaPlay</title>
<link rel="stylesheet" href="css/game.css"/>
<style>
  body{display:flex;flex-direction:column;min-height:100vh;}
  .main{flex:1;padding:1rem;display:flex;flex-direction:column;align-items:center;gap:1rem;max-width:580px;margin:0 auto;width:100%;}
  #jogo-grid{display:grid;gap:4px;background:var(--dark3);padding:4px;border-radius:12px;border:3px solid var(--border);}
  .peca-c{cursor:pointer;border-radius:6px;transition:transform .12s,box-shadow .12s;display:block;}
  .peca-c:hover{transform:scale(1.04);box-shadow:0 0 10px rgba(250,204,21,.5);}
  .peca-c.sel{box-shadow:0 0 0 4px var(--yellow),0 0 16px rgba(250,204,21,.6);transform:scale(1.06);}
  .peca-c.ok{box-shadow:0 0 0 3px var(--green);cursor:default;}
  .peca-c.ok:hover{transform:none;}
  .stats-row{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
  .sc{background:var(--dark2);border:2px solid var(--border);border-radius:8px;padding:.3rem .8rem;text-align:center;}
  .sc .v{font-family:var(--pixel);font-size:.85rem;color:var(--yellow);}
  .sc .l{font-size:.65rem;color:#64748b;}
  #vitoria{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;text-align:center;padding:1rem;}
  #vitoria.show{display:flex;}
  .vt{font-family:var(--pixel);font-size:clamp(.9rem,3.5vw,1.6rem);color:var(--yellow);text-shadow:3px 3px 0 #000;line-height:1.8;}
  #loading{font-family:var(--pixel);font-size:.6rem;color:#64748b;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<header class="game-header">
  <a href="index.html" class="btn btn-gray" style="font-size:.8rem;">← VOLTAR</a>
  <span class="pixel-title" style="color:#c084fc;">🔲 QUEBRA-CABEÇA</span>
  <div class="score-badge" id="score-badge">⭐ 0</div>
</header>

<div class="main">
  <div class="year-pills">
    <button class="year-pill" data-ano="1" onclick="setAno(1)">🟢 1º</button>
    <button class="year-pill" data-ano="2" onclick="setAno(2)">🔵 2º</button>
    <button class="year-pill" data-ano="3" onclick="setAno(3)">🩷 3º</button>
  </div>
  <div style="display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-green"  onclick="iniciar(2)" style="font-size:.75rem;">🟢 FÁCIL 2×2</button>
    <button class="btn btn-blue"   onclick="iniciar(3)" style="font-size:.75rem;">🔵 MÉDIO 3×3</button>
    <button class="btn btn-purple" onclick="iniciar(4)" style="font-size:.75rem;">🟣 DIFÍCIL 4×4</button>
  </div>
  <div class="stats-row">
    <div class="sc"><div class="v" id="mov-v">0</div><div class="l">MOVIMENTOS</div></div>
    <div class="sc"><div class="v" id="tmp-v">0s</div><div class="l">TEMPO</div></div>
    <div class="sc"><div class="v" id="pal-v">—</div><div class="l">PALAVRA</div></div>
  </div>

  <div style="display:flex;gap:1.2rem;align-items:flex-start;flex-wrap:wrap;justify-content:center;">
    <div>
      <p style="font-family:var(--pixel);font-size:.45rem;color:#64748b;text-align:center;margin-bottom:4px;">MODELO</p>
      <canvas id="preview" width="130" height="150" style="border:3px solid var(--border);border-radius:10px;"></canvas>
    </div>
    <div id="loading">⏳ CARREGANDO...</div>
    <div id="jogo-grid"></div>
  </div>
  <button class="btn btn-gray" onclick="iniciar(gradeN)">🔄 NOVA IMAGEM</button>
</div>

<div id="toast-container"></div>
<div id="confetti-overlay"></div>

<div id="vitoria">
  <canvas id="vit-canvas" width="180" height="200" style="border-radius:14px;border:4px solid var(--yellow);box-shadow:0 0 30px rgba(250,204,21,.5);"></canvas>
  <div class="vt" id="vit-txt">🏆 PARABÉNS!</div>
  <div class="score-badge" style="font-size:1rem;" id="vit-score"></div>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-green" onclick="iniciar(gradeN)">🔄 NOVO JOGO</button>
    <a href="index.html" class="btn btn-gray">🏠 INÍCIO</a>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/sounds.js"></script>
<script src="js/ilustracoes.js"></script>
<script>
let anoAtual = parseInt(new URLSearchParams(location.search).get('ano')) || 1;
let gradeN = 3, pecas = [], sel = -1, pontos = 0, movs = 0;
let timerID, secs = 0, ilCanvas = null, pSz = 90, palavraAtual = null;

document.querySelectorAll('.year-pill').forEach(p => {
  if (parseInt(p.dataset.ano) === anoAtual) p.classList.add('active');
});

function setAno(ano) {
  anoAtual = ano;
  document.querySelectorAll('.year-pill').forEach(p =>
    p.classList.toggle('active', parseInt(p.dataset.ano) === ano));
  iniciar(gradeN);
}

async function iniciar(n) {
  gradeN = n; sel = -1; movs = 0; secs = 0;
  clearInterval(timerID);
  document.getElementById('vitoria').classList.remove('show');
  document.getElementById('jogo-grid').innerHTML = '';
  document.getElementById('loading').style.display = 'block';

  palavraAtual = palavraAleatoria(anoAtual);
  document.getElementById('pal-v').textContent = palavraAtual.palavra;
  document.getElementById('mov-v').textContent = '0';
  document.getElementById('tmp-v').textContent = '0s';

  pSz = n <= 2 ? 115 : n === 3 ? 85 : 66;
  const total = pSz * n;

  // Tenta ilustração desenhada, cai para emoji se não tiver
  const ilImg = await getIlustracao(palavraAtual.palavra);

  // Monta canvas com ilustração + nome
  ilCanvas = document.createElement('canvas');
  ilCanvas.width = ilCanvas.height = total;
  const oc = ilCanvas.getContext('2d');

  if (ilImg) {
    // Fundo suave
    oc.fillStyle = '#f8fafc';
    oc.fillRect(0, 0, total, total);
    // Ilustração ocupa 80% do espaço vertical
    const ilH = Math.floor(total * 0.80);
    oc.drawImage(ilImg, 0, 0, total, ilH);
    // Faixa do nome
    const faixaY = ilH;
    const faixaH = total - ilH;
    oc.fillStyle = '#1e293b';
    oc.fillRect(0, faixaY, total, faixaH);
    oc.strokeStyle = '#4ade80';
    oc.lineWidth = 2;
    oc.beginPath(); oc.moveTo(0, faixaY); oc.lineTo(total, faixaY); oc.stroke();
    const fs = Math.max(10, Math.floor(faixaH * 0.55));
    oc.fillStyle = '#ffffff';
    oc.font = `bold ${fs}px 'Nunito', sans-serif`;
    oc.textAlign = 'center';
    oc.textBaseline = 'middle';
    oc.fillText(palavraAtual.palavra, total / 2, faixaY + faixaH / 2);
  } else {
    // Fallback emoji
    const g = oc.createLinearGradient(0,0,total,total);
    g.addColorStop(0, '#1e3a5f'); g.addColorStop(1, '#0f172a');
    oc.fillStyle = g; oc.fillRect(0,0,total,total);
    oc.font = `${Math.floor(total*0.55)}px serif`;
    oc.textAlign = 'center'; oc.textBaseline = 'middle';
    oc.fillText(palavraAtual.emoji, total/2, total*0.42);
    oc.fillStyle='#fff'; oc.font=`bold ${Math.floor(total*0.1)}px sans-serif`;
    oc.fillText(palavraAtual.palavra, total/2, total*0.82);
  }

  // Preview
  const pv = document.getElementById('preview');
  const pc = pv.getContext('2d');
  pc.clearRect(0,0,130,150);
  pc.drawImage(ilCanvas, 0, 0, 130, 150);

  // Embaralha
  pecas = Array.from({length: n*n}, (_,i) => i);
  do { pecas.sort(() => Math.random()-.5); } while (ordenado());

  document.getElementById('loading').style.display = 'none';
  renderGrid();
  falar(palavraAtual.palavra);

  timerID = setInterval(() => {
    secs++;
    document.getElementById('tmp-v').textContent = secs + 's';
  }, 1000);
}

function renderGrid() {
  const grid = document.getElementById('jogo-grid');
  grid.style.gridTemplateColumns = `repeat(${gradeN}, ${pSz}px)`;
  grid.innerHTML = '';
  pecas.forEach((pidx, pos) => {
    const c = document.createElement('canvas');
    c.width = c.height = pSz;
    c.className = 'peca-c' + (ok(pos) ? ' ok' : '');
    c.dataset.pos = pos;
    const row = Math.floor(pidx / gradeN), col = pidx % gradeN;
    const ctx2 = c.getContext('2d');
    ctx2.drawImage(ilCanvas, col*pSz, row*pSz, pSz, pSz, 0, 0, pSz, pSz);
    ctx2.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx2.lineWidth = 1;
    ctx2.strokeRect(.5, .5, pSz-1, pSz-1);
    if (!ok(pos)) c.addEventListener('click', () => clicar(pos));
    grid.appendChild(c);
  });
}

function clicar(pos) {
  if (sel === -1) {
    sel = pos; SFX.flip(); updSel();
  } else if (sel === pos) {
    sel = -1; updSel();
  } else {
    [pecas[sel], pecas[pos]] = [pecas[pos], pecas[sel]];
    movs++;
    document.getElementById('mov-v').textContent = movs;
    SFX.click(); sel = -1; renderGrid();
    if (ordenado()) vitoria();
  }
}

function updSel() {
  document.querySelectorAll('.peca-c').forEach(c => {
    c.classList.toggle('sel', parseInt(c.dataset.pos) === sel && !ok(parseInt(c.dataset.pos)));
  });
}

function ok(pos) { return pecas[pos] === pos; }
function ordenado() { return pecas.every((p,i) => p === i); }

function vitoria() {
  clearInterval(timerID);
  SFX.vitoria(); confetti();
  const bonus = Math.max(0, 80 - movs*3 - Math.floor(secs/5));
  pontos += 10 + bonus;
  document.getElementById('score-badge').textContent = '⭐ ' + pontos;
  const vc = document.getElementById('vit-canvas');
  vc.getContext('2d').drawImage(ilCanvas, 0, 0, 180, 200);
  document.getElementById('vit-txt').textContent = `🏆 ${palavraAtual.emoji} ${palavraAtual.palavra}`;
  document.getElementById('vit-score').textContent = `⭐ ${pontos} pts · ${movs} mov · ${secs}s`;
  document.getElementById('vitoria').classList.add('show');
  falar('Parabéns! Você montou ' + palavraAtual.palavra);
}

function confetti() {
  const ov = document.getElementById('confetti-overlay');
  ['#4ade80','#60a5fa','#f472b6','#facc15','#fb923c','#c084fc'].forEach(c => {
    for(let i=0;i<12;i++){
      const p=document.createElement('div'); p.className='confetti-p';
      p.style.left=Math.random()*100+'vw';
      p.style.background=c;
      p.style.animationDuration=(1.5+Math.random()*2)+'s';
      p.style.animationDelay=Math.random()+'s';
      ov.appendChild(p); setTimeout(()=>p.remove(),3500);
    }
  });
}

iniciar(gradeN);
</script>
</body>
</html>
